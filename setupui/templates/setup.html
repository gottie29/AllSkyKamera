<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <style>
        body {
            margin: 0;
            background: #0b1220;
            color: #e5e7eb;
            font-family: Arial, Helvetica, sans-serif;
            display: grid;
            place-items: center;
            min-height: 100vh;
            padding: 24px;
        }
        .box {
            width: 100%;
            max-width: 520px;
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 18px;
            padding: 24px;
        }
        h1 { margin-top: 0; }
        .muted { color: #9ca3af; }
        label { display: block; margin: 14px 0 6px; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #243041;
            background: #0b1220;
            color: #e5e7eb;
        }
        button {
            margin-top: 18px;
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-weight: bold;
        }
        .flash { margin-bottom: 12px; padding: 12px; border-radius: 12px; background: #0b1220; border: 1px solid #ef4444; color: #fca5a5; }
    </style>
</head>
<body>
    <div class="box">
        <h1>AllSky Setup UI</h1>
        <p class="muted">Bitte richte die lokale Oberfläche beim ersten Start ein.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post">
            <label>Sprache / Language</label>
            <select name="language">
                <option value="de">Deutsch</option>
                <option value="en">English</option>
            </select>

            <label>Benutzername / Username</label>
            <input type="text" name="username" required>

            <label>Passwort / Password</label>
            <input type="password" name="password" required>

            <label>Passwort wiederholen / Repeat password</label>
            <input type="password" name="password_repeat" required>

            <button type="submit">Speichern / Save</button>
        </form>
    </div>
</body>
</html>
